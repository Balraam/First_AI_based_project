<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spring AI Chatbot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #4ade80;
    --accent-dim: #1a3a26;
    --text: #e8e8e8;
    --text-muted: #888;
    --user-bg: #1a2a1a;
    --user-border: #2d4a2d;
    --ai-bg: #161616;
    --ai-border: #2a2a2a;
    --font-sans: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    color: #0d0d0d;
    flex-shrink: 0;
  }

  .header-title { font-size: 15px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

  .badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 20px;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat-window::-webkit-scrollbar { width: 4px; }
  #chat-window::-webkit-scrollbar-track { background: transparent; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 780px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
  }

  .msg.user .avatar { background: var(--user-border); color: var(--accent); }
  .msg.ai .avatar   { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.65;
    max-width: calc(100% - 48px);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    border-radius: 12px 2px 12px 12px;
    color: #c8f7d8;
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--ai-border);
    border-radius: 2px 12px 12px 12px;
  }

  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 780px;
    margin: 0 auto;
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    min-height: 46px;
    max-height: 160px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  button#send-btn {
    width: 46px; height: 46px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  button#send-btn:hover { opacity: 0.85; }
  button#send-btn:active { transform: scale(0.95); }
  button#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  button#send-btn svg { width: 18px; height: 18px; fill: #0d0d0d; }

  .session-bar {
    display: flex; gap: 8px; align-items: center;
    max-width: 780px; margin: 0 auto 10px;
    font-size: 12px; color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .session-id { color: var(--accent); }

  button.clear-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 3px 10px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  button.clear-btn:hover { border-color: #c0392b; color: #e74c3c; }

  .welcome {
    text-align: center;
    margin: auto;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .welcome h2 { font-size: 22px; font-weight: 300; color: var(--text); margin-bottom: 8px; }
  .welcome p  { font-size: 14px; line-height: 1.7; }
  .welcome code { font-family: var(--font-mono); color: var(--accent); font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">AI</div>
  <div>
    <div class="header-title">Spring AI Chatbot</div>
    <div class="header-sub">Spring Boot 3 + Spring AI + OpenAI</div>
  </div>
  <div class="badge">llama-3.1-8b-instant</div>
</header>

<div id="chat-window">
  <div class="welcome" id="welcome">
    <h2>Hello, how can I help?</h2>
    <p>Powered by <code>Spring AI</code> + <code>Spring Boot 3</code><br/>
    Multi-turn conversation with memory support.</p>
  </div>
</div>

<div class="input-area">
  <div class="session-bar">
    <span>session:</span>
    <span class="session-id" id="session-display">new</span>
    <button class="clear-btn" onclick="clearSession()">clear session</button>
  </div>
  <div class="input-row">
    <textarea id="msg-input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let conversationId = null;

  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const sessionDisplay = document.getElementById('session-display');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function appendMessage(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'user') {
        // User message — just show as plain single line, trim extra newlines
        bubble.textContent = text.replace(/\n+/g, ' ').trim();
    } else {
        // AI message — render line breaks properly
        bubble.innerHTML = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br/>');
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
}

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
        const body = { message: text };
        if (conversationId) body.conversationId = conversationId;

        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        removeTyping();

        conversationId = data.conversationId;
        sessionDisplay.textContent = conversationId.substring(0, 8) + '...';

        // Get the full reply as one string, then display it at once
        const fullReply = data.reply.trim();
        appendMessage('ai', fullReply);

    } catch (err) {
        removeTyping();
        appendMessage('ai', 'Error: ' + err.getMessage() + '. Is the backend running?');
    } finally {
        sendBtn.disabled = false;
        input.focus();
    }
}

  async function clearSession() {
    if (conversationId) {
      try {
        await fetch(`/api/chat/${conversationId}`, { method: 'DELETE' });
      } catch (e) {}
    }
    conversationId = null;
    sessionDisplay.textContent = 'new';
    chatWindow.innerHTML = `
      <div class="welcome" id="welcome">
        <h2>Session cleared</h2>
        <p>Start a fresh conversation below.</p>
      </div>`;
  }
</script>
</body>
</html>
