<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Spring AI Chatbot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* Hard-clamp everything to viewport width — kills horizontal scroll on Android */
        html {
          max-width: 100vw;
          overflow-x: hidden;
        }

        :root {
          --bg: #0d0d0d;
          --surface: #161616;
          --surface2: #1f1f1f;
          --border: #2a2a2a;
          --accent: #4ade80;
          --accent-dim: #1a3a26;
          --text: #e8e8e8;
          --text-muted: #888;
          --user-bg: #1a2a1a;
          --user-border: #2d4a2d;
          --ai-bg: #161616;
          --ai-border: #2a2a2a;
          --font-sans: 'IBM Plex Sans', sans-serif;
          --font-mono: 'IBM Plex Mono', monospace;
          --header-h: 60px;
          --input-area-h: 110px;
        }

        html, body {
          height: 100%;
          height: -webkit-fill-available;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--font-sans);
          width: 100vw;
          max-width: 100vw;
          height: 100dvh;
          display: flex;
          flex-direction: column;
          overflow-x: hidden;
          overflow-y: hidden;
          padding-bottom: env(safe-area-inset-bottom);
        }

        /* ── HEADER ── */
        header {
          padding: 12px 16px;
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          gap: 10px;
          background: var(--surface);
          flex-shrink: 0;
          min-height: var(--header-h);
          width: 100%;
          min-width: 0;
        }

        .logo {
          width: 30px; height: 30px;
          background: var(--accent);
          border-radius: 8px;
          display: flex; align-items: center; justify-content: center;
          font-family: var(--font-mono);
          font-size: 13px;
          font-weight: 500;
          color: #0d0d0d;
          flex-shrink: 0;
        }

        .header-title { font-size: 14px; font-weight: 500; line-height: 1.2; }
        .header-sub   { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* header text wrapper must shrink */
        header > div:not(.logo):not(.badge) { min-width: 0; flex: 1; overflow: hidden; }

        .badge {
          margin-left: auto;
          font-family: var(--font-mono);
          font-size: 10px;
          padding: 3px 8px;
          background: var(--accent-dim);
          color: var(--accent);
          border-radius: 20px;
          white-space: nowrap;
          flex-shrink: 0;
        }

        /* hide subtitle on very small screens */
        @media (max-width: 380px) {
          .header-sub { display: none; }
          .badge      { display: none; }
        }

        /* ── CHAT WINDOW ── */
        #chat-window {
          flex: 1;
          overflow-y: auto;
          overflow-x: hidden;
          width: 100%;
          max-width: 100vw;
          padding: 16px;
          display: flex;
          flex-direction: column;
          gap: 14px;
          scroll-behavior: smooth;
          -webkit-overflow-scrolling: touch;
        }

        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── MESSAGES ── */
        .msg {
          display: flex;
          gap: 10px;
          width: 100%;
          max-width: 100%;
          min-width: 0;
          animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .msg.user { flex-direction: row-reverse; }

        .avatar {
          width: 28px; height: 28px;
          border-radius: 7px;
          flex-shrink: 0;
          display: flex; align-items: center; justify-content: center;
          font-family: var(--font-mono);
          font-size: 11px;
          font-weight: 500;
          align-self: flex-start;
          margin-top: 2px;
        }

        .msg.user .avatar { background: var(--user-border); color: var(--accent); }
        .msg.ai   .avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

        .bubble {
          padding: 10px 14px;
          border-radius: 12px;
          font-size: 14px;
          line-height: 1.65;
          max-width: calc(100% - 42px);
          min-width: 0;
          white-space: pre-wrap;
          word-break: break-word;
          overflow-wrap: break-word;
          overflow: hidden;
        }

        .msg.user .bubble {
          background: var(--user-bg);
          border: 1px solid var(--user-border);
          border-radius: 12px 2px 12px 12px;
          color: #c8f7d8;
        }

        .msg.ai .bubble {
          background: var(--ai-bg);
          border: 1px solid var(--ai-border);
          border-radius: 2px 12px 12px 12px;
        }

        /* ── TYPING INDICATOR ── */
        .typing-indicator {
          display: flex;
          gap: 5px;
          align-items: center;
          padding: 4px 0;
        }

        .typing-indicator span {
          width: 7px; height: 7px;
          background: var(--accent);
          border-radius: 50%;
          animation: bounce 1.2s infinite;
          opacity: 0.6;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
          0%, 80%, 100% { transform: translateY(0); }
          40%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ── INPUT AREA ── */
        .input-area {
          padding: 10px 16px 14px;
          border-top: 1px solid var(--border);
          background: var(--surface);
          flex-shrink: 0;
          width: 100%;
          max-width: 100vw;
        }

        .session-bar {
          display: flex;
          gap: 6px;
          align-items: center;
          margin-bottom: 8px;
          font-size: 11px;
          color: var(--text-muted);
          font-family: var(--font-mono);
          flex-wrap: wrap;
        }

        .session-id { color: var(--accent); word-break: break-all; }

        button.clear-btn {
          margin-left: auto;
          background: transparent;
          border: 1px solid var(--border);
          border-radius: 6px;
          color: var(--text-muted);
          font-size: 11px;
          font-family: var(--font-mono);
          padding: 3px 10px;
          cursor: pointer;
          transition: border-color 0.15s, color 0.15s;
          /* tappable size on mobile */
          min-height: 28px;
          touch-action: manipulation;
        }

        button.clear-btn:hover  { border-color: #c0392b; color: #e74c3c; }
        button.clear-btn:active { border-color: #c0392b; color: #e74c3c; }

        .input-row {
          display: flex;
          gap: 8px;
          align-items: flex-end;
          width: 100%;
          max-width: 100%;
        }

        textarea {
          flex: 1;
          background: var(--surface2);
          border: 1px solid var(--border);
          border-radius: 10px;
          color: var(--text);
          font-family: var(--font-sans);
          font-size: 16px;   /* 16px prevents iOS zoom-on-focus */
          padding: 10px 12px;
          resize: none;
          min-height: 44px;
          max-height: 140px;
          outline: none;
          transition: border-color 0.15s;
          line-height: 1.5;
          -webkit-appearance: none;
        }

        textarea:focus { border-color: var(--accent); }
        textarea::placeholder { color: var(--text-muted); }

        button#send-btn {
          width: 44px; height: 44px;
          background: var(--accent);
          border: none;
          border-radius: 10px;
          cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          transition: opacity 0.15s, transform 0.1s;
          flex-shrink: 0;
          touch-action: manipulation;
          -webkit-tap-highlight-color: transparent;
        }

        button#send-btn:hover  { opacity: 0.85; }
        button#send-btn:active { transform: scale(0.93); }
        button#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        button#send-btn svg { width: 18px; height: 18px; fill: #0d0d0d; }

        /* ── WELCOME ── */
        .welcome {
          text-align: center;
          margin: auto;
          padding: 32px 16px;
          color: var(--text-muted);
        }
        .welcome h2 { font-size: 20px; font-weight: 300; color: var(--text); margin-bottom: 8px; }
        .welcome p  { font-size: 14px; line-height: 1.7; }
        .welcome code { font-family: var(--font-mono); color: var(--accent); font-size: 12px; }

        /* ── TABLET+ ── */
        @media (min-width: 640px) {
          #chat-window { padding: 24px; gap: 16px; }

          .input-area  { padding: 14px 24px 20px; }

          /* centre content on wide screens */
          .session-bar,
          .input-row {
            max-width: 780px;
            margin-left: auto;
            margin-right: auto;
          }
          .session-bar { margin-bottom: 10px; }

          .bubble { font-size: 14px; }

          header { padding: 14px 24px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">AI</div>
    <div>
        <div class="header-title">Spring AI Chatbot</div>
        <div class="header-sub">Spring Boot 3 + Spring AI + OpenAI</div>
    </div>
    <div class="badge">llama-3.1-8b-instant</div>
</header>

<div id="chat-window">
    <div class="welcome" id="welcome">
        <h2>Hello, how can I help?</h2>
        <p>Powered by <code>Spring AI</code> + <code>Spring Boot 3</code><br/>
            Multi-turn conversation with memory support.</p>
    </div>
</div>

<div class="input-area">
    <div class="session-bar">
        <span>session:</span>
        <span class="session-id" id="session-display">new</span>
        <button class="clear-btn" onclick="clearSession()">clear session</button>
    </div>
    <div class="input-row">
        <textarea id="msg-input" placeholder="Type a message…" rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()" aria-label="Send">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    let conversationId = null;

    const chatWindow    = document.getElementById('chat-window');
    const input         = document.getElementById('msg-input');
    const sendBtn       = document.getElementById('send-btn');
    const sessionDisplay= document.getElementById('session-display');

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    });

    // Enter to send, Shift+Enter for newline (desktop only)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function appendMessage(role, text) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div    = document.createElement('div');
      div.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : 'AI';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'user') {
        bubble.textContent = text.replace(/\n+/g, ' ').trim();
      } else {
        bubble.innerHTML = text
          .replace(/&/g,  '&amp;')
          .replace(/</g,  '&lt;')
          .replace(/>/g,  '&gt;')
          .replace(/\n\n/g, '</p><p>')
          .replace(/\n/g,   '<br/>');
      }

      div.appendChild(avatar);
      div.appendChild(bubble);
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return bubble;
    }

    function showTyping() {
      const div    = document.createElement('div');
      div.className = 'msg ai';
      div.id        = 'typing';

      const avatar = document.createElement('div');
      avatar.className  = 'avatar';
      avatar.textContent = 'AI';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      div.appendChild(avatar);
      div.appendChild(bubble);
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', text);
      showTyping();

      try {
        const body = { message: text };
        if (conversationId) body.conversationId = conversationId;

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        removeTyping();

        conversationId = data.conversationId;
        sessionDisplay.textContent = conversationId.substring(0, 8) + '…';

        appendMessage('ai', data.reply.trim());

      } catch (err) {
        removeTyping();
        appendMessage('ai', 'Error: ' + err.message + '. Is the backend running?');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    async function clearSession() {
      if (conversationId) {
        try {
          await fetch(`/api/chat/${conversationId}`, { method: 'DELETE' });
        } catch (e) {}
      }
      conversationId = null;
      sessionDisplay.textContent = 'new';
      chatWindow.innerHTML = `
        <div class="welcome" id="welcome">
          <h2>Session cleared</h2>
          <p>Start a fresh conversation below.</p>
        </div>`;
    }
</script>
</body>
</html>
